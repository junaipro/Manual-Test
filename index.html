<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이수페타시스 전자증빙 FD 매뉴얼</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0f1e3c;
    --navy2: #1a2f57;
    --blue: #1e4db7;
    --blue-light: #2563eb;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --bg: #f0f4f8;
    --bg2: #e8eef5;
    --white: #ffffff;
    --text: #1e293b;
    --text2: #475569;
    --text3: #94a3b8;
    --border: #cbd5e1;
    --border2: #e2e8f0;
    --green: #059669;
    --green-bg: #ecfdf5;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --yellow: #d97706;
    --yellow-bg: #fffbeb;
    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --sidebar-w: 280px;
    --header-h: 52px;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── TOP HEADER ── */
  .top-header {
    height: var(--header-h);
    background: var(--navy);
    display: flex; align-items: center; padding: 0 20px;
    gap: 12px; flex-shrink: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .top-header .logo {
    display: flex; align-items: center; gap: 10px;
    color: white; font-weight: 700; font-size: 15px; letter-spacing: -.3px;
  }
  .top-header .logo-icon {
    width: 30px; height: 30px; background: var(--blue-light);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .top-header .subtitle { color: #94a3b8; font-size: 12px; font-weight: 400; margin-left: 4px; }
  .top-header .spacer { flex: 1; }
  .top-header .badge {
    background: rgba(255,255,255,.1); color: #cbd5e1; font-size: 11px;
    padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.15);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── BODY LAYOUT ── */
  .body-wrap { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w); background: var(--navy2);
    display: flex; flex-direction: column; flex-shrink: 0;
    overflow: hidden; transition: width .25s ease;
  }
  .sidebar.collapsed { width: 0; }

  .sidebar-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-head h3 { color: #cbd5e1; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }

  .sidebar-add-btn {
    background: var(--blue-light); color: white; border: none; cursor: pointer;
    font-size: 11px; padding: 4px 10px; border-radius: 5px; font-family: inherit;
    font-weight: 500; display: flex; align-items: center; gap: 4px;
    transition: background .15s;
  }
  .sidebar-add-btn:hover { background: var(--blue); }

  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

  .menu-group { margin-bottom: 4px; }
  .menu-group-label {
    color: #64748b; font-size: 10px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; padding: 8px 16px 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    user-select: none; transition: color .15s;
  }
  .menu-group-label:hover { color: #94a3b8; }
  .menu-group-label .arrow { font-size: 9px; transition: transform .2s; margin-right: 6px; }
  .menu-group.collapsed .arrow { transform: rotate(-90deg); }
  .menu-group-items { overflow: hidden; max-height: 500px; transition: max-height .25s ease; }
  .menu-group.collapsed .menu-group-items { max-height: 0; }
  .menu-item-icon:empty { display: none; }
  .menu-item.sub-item { padding-left: 24px; }

  .menu-item {
    display: flex; align-items: center;
    padding: 0 8px 0 12px; height: 36px;
    cursor: pointer; border-radius: 6px; margin: 1px 8px;
    transition: all .15s; position: relative; gap: 8px;
  }
  .menu-item:hover { background: rgba(255,255,255,.07); }
  .menu-item.active { background: var(--blue-light); }
  .menu-item.active .menu-item-icon { color: white; }
  .menu-item.active .menu-item-label { color: white; font-weight: 600; }

  .menu-item-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; color: #64748b; transition: color .15s; }
  .menu-item-label { color: #94a3b8; font-size: 13px; flex: 1; transition: color .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-item:hover .menu-item-label { color: #cbd5e1; }
  .menu-item:hover .menu-item-icon { color: #94a3b8; }

  .menu-item-actions {
    display: none; align-items: center; gap: 2px;
  }
  .menu-item:hover .menu-item-actions { display: flex; }
  .menu-item.active .menu-item-actions { display: flex; }

  .mact-btn {
    background: rgba(255,255,255,.1); border: none; color: #94a3b8;
    width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    font-size: 11px; display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .mact-btn:hover { background: rgba(255,255,255,.2); color: white; }
  .mact-btn.del:hover { background: rgba(220,38,38,.3); color: #fca5a5; }

  /* inline edit */
  .menu-item input.edit-input {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: white; font-family: inherit; font-size: 13px;
    width: 100%; padding: 2px 6px; border-radius: 4px; outline: none;
  }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .main-toolbar {
    height: 42px; background: white; border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; padding: 0 20px; gap: 10px;
    flex-shrink: 0; box-shadow: var(--shadow);
  }
  .toggle-sidebar-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .toggle-sidebar-btn:hover { background: var(--bg2); color: var(--text); }
  .breadcrumb { color: var(--text3); font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .breadcrumb .sep { color: var(--border); }
  .breadcrumb .current { color: var(--text2); font-weight: 500; }

  .main-content { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .main-content::-webkit-scrollbar { width: 6px; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── WELCOME PAGE ── */
  .welcome-page { max-width: 800px; margin: 0 auto; padding: 20px 0; }
  .welcome-hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    border-radius: 16px; padding: 40px; color: white; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .welcome-hero::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px; background: rgba(255,255,255,.05);
    border-radius: 50%;
  }
  .welcome-hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .welcome-hero p { color: rgba(255,255,255,.7); font-size: 14px; line-height: 1.7; }
  .welcome-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 24px; }
  .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .lbl { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; }
  .welcome-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
  .welcome-card {
    background: white; border-radius: 12px; padding: 20px;
    border: 1px solid var(--border2); cursor: pointer;
    transition: all .2s; box-shadow: var(--shadow);
  }
  .welcome-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--accent); }
  .welcome-card .icon { font-size: 22px; margin-bottom: 10px; }
  .welcome-card h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .welcome-card p { font-size: 12px; color: var(--text3); line-height: 1.6; }
  .welcome-card .arrow { color: var(--accent); font-size: 14px; margin-top: 10px; font-weight: 600; }

  /* ── FD PAGE ── */
  .fd-page { max-width: 960px; margin: 0 auto; }

  .fd-header-card {
    background: white; border-radius: 12px; padding: 24px 28px;
    border: 1px solid var(--border2); box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .fd-prog-title {
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px;
  }
  .fd-prog-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .fd-prog-info h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .fd-prog-info .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .tag-blue { background: #eff6ff; color: var(--blue-light); }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-gray { background: var(--bg2); color: var(--text2); }
  .tag-purple { background: var(--purple-bg); color: var(--purple); }

  .fd-meta-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }
  .fd-meta-item { padding: 12px 14px; background: var(--bg); }
  .fd-meta-item:not(:last-child) { border-right: 1px solid var(--border2); }
  .fd-meta-item .lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .fd-meta-item .val { font-size: 13px; font-weight: 500; color: var(--text); }

  /* ── SECTION CARD ── */
  .section-card {
    background: white; border-radius: 12px; border: 1px solid var(--border2);
    box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
  }
  .section-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    user-select: none; transition: background .15s;
  }
  .section-header:hover { background: var(--bg); }
  .section-header .sec-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0;
  }
  .sec-blue { background: #eff6ff; }
  .sec-green { background: var(--green-bg); }
  .sec-yellow { background: var(--yellow-bg); }
  .sec-purple { background: var(--purple-bg); }
  .sec-red { background: var(--red-bg); }
  .section-header h2 { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .section-header .count { font-size: 11px; color: var(--text3); background: var(--bg2); padding: 2px 8px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; }
  .section-header .chevron { color: var(--text3); font-size: 12px; transition: transform .2s; }
  .section-header.open .chevron { transform: rotate(90deg); }
  .section-body { padding: 0; display: none; }
  .section-body.open { display: block; }

  /* overview */
  .overview-text { padding: 16px 20px; font-size: 13px; line-height: 1.8; color: var(--text2); border-left: 3px solid var(--accent); margin: 16px 20px; border-radius: 0 6px 6px 0; background: #f8faff; }

  /* ── TABLE ── */
  .fd-table-wrap { overflow-x: auto; }
  .fd-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .fd-table thead th {
    background: var(--navy); color: white; padding: 10px 14px;
    text-align: left; font-weight: 600; font-size: 11px; letter-spacing: .04em;
    white-space: nowrap; border-right: 1px solid rgba(255,255,255,.1);
  }
  .fd-table thead th:last-child { border-right: none; }
  .fd-table tbody tr { border-bottom: 1px solid var(--border2); transition: background .1s; }
  .fd-table tbody tr:last-child { border-bottom: none; }
  .fd-table tbody tr:hover { background: #f8faff; }
  .fd-table tbody tr:nth-child(even) { background: var(--bg); }
  .fd-table tbody tr:nth-child(even):hover { background: #f0f4fb; }
  .fd-table td { padding: 9px 14px; vertical-align: top; color: var(--text2); border-right: 1px solid var(--border2); }
  .fd-table td:last-child { border-right: none; }
  .fd-table .field-name { font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .fd-table .field-desc { max-width: 340px; white-space: pre-wrap; line-height: 1.6; }
  .req-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .req-필수 { background: #fef2f2; color: #dc2626; }
  .req-선택 { background: #f0fdf4; color: #16a34a; }
  .req-display { background: #eff6ff; color: #2563eb; }
  .req-default { background: var(--bg2); color: var(--text3); }
  .field-len { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }

  /* ── LOGIC LIST ── */
  .logic-list { padding: 16px 20px; }
  .logic-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 12px; border-radius: 6px; margin-bottom: 4px;
    font-size: 12.5px; line-height: 1.7; color: var(--text2);
    border-left: 2px solid transparent;
  }
  .logic-item.section-head {
    background: var(--navy); color: white; border-radius: 6px;
    font-weight: 600; font-size: 12px; border-left: none; margin-top: 8px;
    padding: 8px 14px;
  }
  .logic-item.subsection {
    background: #eff6ff; border-left-color: var(--accent);
    color: var(--blue); font-weight: 500;
  }
  .logic-item.code-block {
    background: #0f172a; color: #7dd3fc;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    white-space: pre-wrap; border-radius: 8px; margin: 8px 0;
    border-left: 3px solid var(--accent); line-height: 1.6;
  }
  .logic-item.normal { background: var(--bg); border-left-color: var(--border); }
  .logic-item.normal:hover { background: var(--bg2); border-left-color: var(--accent); }

  /* ── HISTORY TABLE ── */
  .history-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .history-table th {
    background: #1e293b; color: white; padding: 9px 14px;
    text-align: left; font-weight: 600; font-size: 11px;
  }
  .history-table td { padding: 9px 14px; border-bottom: 1px solid var(--border2); color: var(--text2); }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: var(--bg); }

  /* ── EXTRA SECTIONS ── */
  .extra-section-wrap { padding: 4px 0; }
  .extra-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .extra-edit-btn, .extra-save-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 14px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s;
  }
  .extra-edit-btn { background: #f1f5f9; color: #475569; }
  .extra-edit-btn:hover { background: #e2e8f0; }
  .extra-save-btn { background: #3b82f6; color: white; }
  .extra-save-btn:hover { background: #2563eb; }
  .extra-upload-area {
    border: 2px dashed #e2e8f0; border-radius: 8px; padding: 32px;
    text-align: center; cursor: pointer; color: #94a3b8; font-size: 14px;
    transition: border-color .15s; margin-bottom: 12px;
  }
  .extra-upload-area:hover { border-color: #3b82f6; color: #3b82f6; }
  .extra-text {
    font-size: 13px; color: #334155; line-height: 1.8;
    white-space: pre-wrap; min-height: 40px;
  }

  .screen-img-wrap {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    resize: both;
    overflow: auto;
    min-width: 200px;
    min-height: 100px;
    max-width: 100%;
    width: fit-content;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    position: relative;
  }
  .screen-img-wrap::after {
    content: '↔';
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    user-select: none;
  }
  .screen-img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    display: block;
  }
  .editable-cell {
    cursor: default;
    pointer-events: none;
  }
  .editable-cell:hover { background: none; }
  .editable-cell .empty-desc { color: #cbd5e1; font-style: italic; font-size: 12px; }
  .editable-cell input {
    width: 100%; box-sizing: border-box;
    border: 2px solid #3b82f6; border-radius: 4px;
    padding: 4px 8px; font-size: 13px; outline: none;
    font-family: inherit; background: #fff;
  }

  /* ── END EXTRA ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center; z-index: 999;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 14px; padding: 28px;
    width: 400px; box-shadow: var(--shadow-lg);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
  .modal label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; }
  .modal input, .modal select {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 7px; font-family: inherit; font-size: 13px; color: var(--text);
    outline: none; transition: border-color .15s; margin-bottom: 14px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-btns { display: flex; justify-content: flex-end; gap: 8px; }
  .btn { padding: 8px 18px; border-radius: 7px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-cancel { background: var(--bg2); color: var(--text2); }
  .btn-cancel:hover { background: var(--border); }
  .btn-primary { background: var(--blue-light); color: white; }
  .btn-primary:hover { background: var(--blue); }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── SCROLLBAR ── */
  .main-content::-webkit-scrollbar-track { background: transparent; }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    width: 4px; background: transparent; cursor: col-resize; flex-shrink: 0;
    transition: background .15s;
  }
  .resize-handle:hover { background: var(--accent); }

  @media (max-width: 768px) {
    .sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; z-index: 50; }
    .welcome-stats { grid-template-columns: repeat(3,1fr); }
    .welcome-grid { grid-template-columns: 1fr; }
    .fd-meta-grid { grid-template-columns: repeat(2,1fr); }
    .fd-meta-item:nth-child(2) { border-right: none; }
    .fd-meta-item:nth-child(3) { border-top: 1px solid var(--border2); }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <span>이수페타시스 전자증빙</span>
    <span class="subtitle">FD 매뉴얼</span>
  </div>
  <div class="spacer"></div>
  <div class="badge">v2.3 · 2026.03</div>
</header>

<div class="body-wrap">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h3>메뉴 구성</h3>
      <button class="sidebar-add-btn" onclick="openAddModal()">＋ 추가</button>
    </div>

// ──────────────────────────────────────────────
// RENDER SIDEBAR
// ──────────────────────────────────────────────
function renderSidebar() {
  const scroll = document.getElementById('sidebarScroll');
  const groups = {};
  const groupOrder = [];
  menuItems.forEach(item => {
    const g = item.group || '__top__';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(item);
  });

  let html = '';
  if (groups['__top__']) {
    groups['__top__'].forEach(item => { html += renderMenuItem(item); });
  }
  groupOrder.filter(g => g !== '__top__').forEach(g => {
    const isCollapsed = collapsedGroups.has(g) ? 'collapsed' : '';
    const gid = g.replace(/\s/g,'_');
    html += `<div class="menu-group ${isCollapsed}" id="grp_${gid}">
      <div class="menu-group-label" onclick="toggleGroup('${g}')">
        <span>${g}</span><span class="arrow">▼</span>
      </div>
      <div class="menu-group-items">`;
    groups[g].forEach(item => { html += renderMenuItem(item); });
    html += `</div></div>`;
  });
  scroll.innerHTML = html;
}

function toggleGroup(g) {
  if (collapsedGroups.has(g)) collapsedGroups.delete(g);
  else collapsedGroups.add(g);
  renderSidebar();
}

function renderMenuItem(item) {
  const isActive = item.id === activeId;
  const isEditing = item.id === editingId;
  const isSub = item.group === '컨커넌트';
  return `
  <div class="menu-item ${isActive ? 'active' : ''} ${isSub ? 'sub-item' : ''}" id="mi_${item.id}"
       onclick="selectMenu('${item.id}', event)">
    <span class="menu-item-icon">${item.icon}</span>
    ${isEditing
      ? `<input class="edit-input" id="edit_${item.id}" value="${item.label}"
           onclick="event.stopPropagation()"
           onkeydown="editKeydown(event,'${item.id}')"
           onblur="finishEdit('${item.id}')" />`
      : `<span class="menu-item-label">${item.label}</span>`
    }
    <div class="menu-item-actions">
      ${!isEditing ? `<button class="mact-btn" title="이름 변경" onclick="startEdit('${item.id}',event)">✏️</button>` : ''}
    </div>
  </div>`;
}

// ──────────────────────────────────────────────
// MENU ACTIONS
// ──────────────────────────────────────────────
function selectMenu(id, e) {
  if (editingId) return;
  activeId = id;
  renderSidebar();
  renderContent();
  document.getElementById('breadcrumbCurrent').textContent =
    id === 'home' ? '홈' : menuItems.find(m=>m.id===id)?.label || id;
}

function startEdit(id, e) {
  e.stopPropagation();
  editingId = id;
  renderSidebar();
  setTimeout(() => {
    const inp = document.getElementById(`edit_${id}`);
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

function finishEdit(id) {
  const inp = document.getElementById(`edit_${id}`);
  if (inp) {
    const item = menuItems.find(m => m.id === id);
    if (item) item.label = inp.value.trim() || item.label;
  }
  editingId = null;
  renderSidebar();
}

function editKeydown(e, id) {
  if (e.key === 'Enter') finishEdit(id);
  if (e.key === 'Escape') { editingId = null; renderSidebar(); }
}

function deleteMenu(id, e) {
  e.stopPropagation();
  if (!confirm('이 메뉴 항목을 삭제하시겠습니까?')) return;
  menuItems = menuItems.filter(m => m.id !== id);
  if (activeId === id) { activeId = 'home'; renderContent(); }
  renderSidebar();
}

function openAddModal() { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

function addMenuItem() {
  const name = document.getElementById('newMenuName').value.trim();
  const group = document.getElementById('newMenuGroup').value;
  const icon = document.getElementById('newMenuIcon').value.trim() || '📄';
  if (!name) { alert('메뉴명을 입력하세요.'); return; }
  const id = 'custom_' + Date.now();
  menuItems.push({ id, label: name, icon, type: 'custom', group });
  closeAddModal();
  document.getElementById('newMenuName').value = '';
  document.getElementById('newMenuIcon').value = '';
  renderSidebar();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

// ──────────────────────────────────────────────
// RENDER CONTENT
// ──────────────────────────────────────────────
function renderContent() {
  const mc = document.getElementById('mainContent');
  if (activeId === 'home') { mc.innerHTML = renderHome(); return; }
  const item = menuItems.find(m => m.id === activeId);
  if (!item) { mc.innerHTML = renderEmpty(); return; }
  const data = FD_DATA[item.id] || FD_DATA[item.label];
  if (!data) { mc.innerHTML = renderEmpty(item.label); return; }
  mc.innerHTML = renderFD(item, data);
  // section toggles
  document.querySelectorAll('.section-header').forEach(h => {
    h.addEventListener('click', () => {
      h.classList.toggle('open');
      h.nextElementSibling.classList.toggle('open');
    });
    // open by default
    h.classList.add('open');
    h.nextElementSibling.classList.add('open');
  });
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function reqBadge(req) {
  if (!req) return '';
  const r = req.toLowerCase();
  if (r.includes('필수')) return `<span class="req-badge req-필수">필수</span>`;
  if (r.includes('선택')) return `<span class="req-badge req-선택">선택</span>`;
  if (r.includes('display') || r.includes('only')) return `<span class="req-badge req-display">Display</span>`;
  if (r.includes('버튼')) return `<span class="req-badge req-display">버튼</span>`;
  return `<span class="req-badge req-default">${esc(req)}</span>`;
}

let logicEditMode = {};
function toggleLogicEdit(itemId) {
  const view = document.getElementById('logicView_' + itemId);
  const edit = document.getElementById('logicEdit_' + itemId);
  const editBtn = document.getElementById('logicEditBtn_' + itemId);
  const saveBtn = document.getElementById('logicSaveBtn_' + itemId);
  const isEditing = logicEditMode[itemId];
  if (!isEditing) {
    // 현재 logic 데이터를 텍스트로 변환
    const fdData = FD_DATA[itemId];
    const lines = (fdData?.logic || [])
      .filter(l => l.type === 'normal' || l.type === 'head' || l.type === 'code')
      .map(l => l.text).join('\n');
    edit.value = lines;
    view.style.display = 'none';
    edit.style.display = 'block';
    editBtn.textContent = '✖ 취소'; editBtn.style.background = '#fee2e2'; editBtn.style.color = '#dc2626';
    saveBtn.style.display = 'inline-flex';
    logicEditMode[itemId] = true;
  } else {
    view.style.display = 'block';
    edit.style.display = 'none';
    editBtn.textContent = '✏️ 편집'; editBtn.style.background = ''; editBtn.style.color = '';
    saveBtn.style.display = 'none';
    logicEditMode[itemId] = false;
  }
}

function saveLogic(itemId) {
  const view = document.getElementById('logicView_' + itemId);
  const edit = document.getElementById('logicEdit_' + itemId);
  const editBtn = document.getElementById('logicEditBtn_' + itemId);
  const saveBtn = document.getElementById('logicSaveBtn_' + itemId);
  const val = edit.value.trim();
  const fdData = FD_DATA[itemId];

  // 기존 table/detail_table 타입은 유지하고 text 타입만 교체
  const nonTextLogic = (fdData?.logic || []).filter(l => l.type === 'table' || l.type === 'detail_table');
  const newTextLogic = val ? val.split('\n').map(line => {
    if (line.startsWith('■')) return { type: 'head', text: line };
    if (line.startsWith('--') || line.startsWith('SELECT') || line.startsWith('FROM') || line.startsWith('WHERE')) return { type: 'code', text: line };
    return { type: 'normal', text: line };
  }) : [];

  if (fdData) fdData.logic = [...nonTextLogic, ...newTextLogic];

  // 화면 다시 렌더링
  const newItems = (fdData?.logic || []).map(l => {
    if (l.type === 'table') {
      const rows = l.rows.map(r => `<tr><td class="field-name" style="font-family:monospace;font-size:12px;">${esc(r.proc)}</td><td class="field-desc">${esc(r.desc)}</td></tr>`).join('');
      return `<div class="logic-item" style="padding:0"><div class="fd-table-wrap"><table class="fd-table"><thead><tr><th style="width:220px">프로시저명</th><th>내용</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
    if (l.type === 'detail_table') {
      const rows = l.rows.map(r => `<tr><td class="field-name">${esc(r.item)}</td><td class="field-desc">${esc(r.rule)}</td></tr>`).join('');
      return `<div class="logic-item" style="padding:0 0 0 24px"><div class="fd-table-wrap"><table class="fd-table"><thead><tr><th style="width:120px">항목</th><th>처리 규칙</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
    if (l.type === 'head') return `<div class="logic-item section-head">🔷 ${esc(l.text)}</div>`;
    if (l.type === 'code') return `<div class="logic-item code-block">${esc(l.text)}</div>`;
    return `<div class="logic-item normal">${esc(l.text)}</div>`;
  }).join('') || '<div style="padding:16px 20px;color:#94a3b8;font-size:13px">정의된 로직이 없습니다</div>';

  view.innerHTML = newItems;
  view.style.display = 'block';
  edit.style.display = 'none';
  editBtn.textContent = '✏️ 편집'; editBtn.style.background = ''; editBtn.style.color = '';
  saveBtn.style.display = 'none';
  logicEditMode[itemId] = false;

  try {
    const s = JSON.parse(localStorage.getItem('fd_logic') || '{}');
    s[itemId] = val;
    localStorage.setItem('fd_logic', JSON.stringify(s));
  } catch(e) {}
}

    img.style.display = 'block';
    if (ph) ph.style.display = 'none';

        return { type: 'normal', text: line };
      }) : [];
      FD_DATA[itemId].logic = [...nonTextLogic, ...newTextLogic];
    }
  });

  // extra 섹션 복원 (program_logic, content_desc 등 - 이미지 제외)
  const storedExtra = JSON.parse(localStorage.getItem('fd_extra') || '{}');
  Object.entries(storedExtra).forEach(([itemId, dataMap]) => {
    if (FD_DATA[itemId]) {
      Object.entries(dataMap).forEach(([dataKey, val]) => {
        if (dataKey !== 'menu_screen') FD_DATA[itemId][dataKey] = val;
      });
    }
  });
} catch(e) { console.warn('localStorage 복원 실패:', e); }

renderSidebar();
renderContent();
</script>
</body>
</html>
